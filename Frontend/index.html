<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> <!-- link to css file-->
    <script src="script.js" defer></script> <!-- link to javascript file-->
    <title>CardFlash</title>

</head>

<body>
    <img src="CardFlash Logo.png" alt="Cardflash Logo"> <!-- logo i created in piskel-->
    <h1 class="title">CardFlash</h1> <!-- title i came up with and the slogan below-->
    <p class="subtitle">Memorise flashcards in a flash</p>
    <div class="add-flashcard">
        <input type="text" id="new-question" placeholder="Enter question">
        <input type="text" id="new-answer" placeholder="Enter answer">
        <button onclick="addFlashcard()">Add Flashcard</button> <!-- add flashcard button at the top as that is the main feature of this website-->
    </div>

    <div class="flashcard-container" id="container"></div>
    <div id="counter">Total cards: 0</div> <!-- counter to count how many flashcards there are in total-->
    <div class="controls"> <!-- buttons to switch through flashcards, previous button will cycle through cards from the front to the end, 
        next will switch to the next card but the current card will be removed, delete deletes the current card-->
        <button onclick="prevFlashcard()">Previous</button>
        <button onclick="nextFlashcard()">Next</button>
        <button onclick="deleteFlashcard()">Delete</button>
    </div>

</body></html>
